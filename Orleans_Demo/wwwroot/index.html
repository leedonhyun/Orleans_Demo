<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orleans Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #0f1d2b;
      --bg-2: #15344b;
      --panel: rgba(10, 20, 33, 0.72);
      --line: rgba(255, 255, 255, 0.14);
      --txt: #e6f4ff;
      --sub: #9ac2db;
      --ok: #7ae582;
      --warn: #ff8c69;
      --chip: rgba(255, 255, 255, 0.08);
      --chip-active: rgba(62, 208, 255, 0.26);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", sans-serif;
      color: var(--txt);
      background:
        radial-gradient(circle at 10% 20%, rgba(62, 208, 255, 0.22), transparent 35%),
        radial-gradient(circle at 90% 80%, rgba(255, 209, 102, 0.18), transparent 30%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .shell {
      width: min(980px, 100%);
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      animation: fadeUp 440ms ease-out;
    }

    .top {
      padding: 22px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .title {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0;
      color: var(--sub);
      font-size: 14px;
    }

    .controls {
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .chat {
      height: 55vh;
      padding: 16px 22px;
      overflow-y: auto;
      display: grid;
      align-content: start;
      gap: 10px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 14px;
    }

    .msg {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.16);
      display: grid;
      gap: 8px;
    }

    .meta {
      color: var(--sub);
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .read-state {
      font-size: 11px;
      opacity: 0.9;
    }

    .read-state.read {
      color: var(--ok);
    }

    .reactions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    button.reaction-chip {
      width: auto;
      border: 1px solid var(--line);
      background: var(--chip);
      color: var(--txt);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 120ms ease, transform 120ms ease;
    }

    button.reaction-chip.active {
      background: var(--chip-active);
    }

    button.reaction-chip:hover {
      transform: translateY(-1px);
      filter: none;
    }

    .footer {
      padding: 14px 22px 22px;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .typing {
      padding: 0 22px 8px;
      color: var(--sub);
      font-size: 12px;
      min-height: 18px;
    }

    input, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(6, 13, 22, 0.8);
      color: var(--txt);
      padding: 10px 12px;
      font: inherit;
    }

    input::placeholder { color: #8ba8bb; }

    button {
      cursor: pointer;
      background: linear-gradient(135deg, #1ca9d6, #3ed0ff);
      color: #00202b;
      font-weight: 700;
      border: none;
      transition: transform 120ms ease, filter 120ms ease;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.06); }
    button:active { transform: translateY(0); }

    .actions {
      display: flex;
      gap: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      color: var(--sub);
      font-size: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warn);
      box-shadow: 0 0 0 6px rgba(255, 140, 105, 0.15);
    }

    .dot.ok {
      background: var(--ok);
      box-shadow: 0 0 0 6px rgba(122, 229, 130, 0.15);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 840px) {
      .controls { grid-template-columns: 1fr 1fr; }
      .footer { grid-template-columns: 1fr; }
      .actions { display: grid; grid-template-columns: 1fr 1fr; }
      .chat { height: 52vh; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="top">
      <h1 class="title">Orleans Real-time Chat</h1>
      <p class="subtitle">SignalR + Redis Backplane + Read Receipt + Reactions + Ack/Retry</p>
      <span class="pill"><span id="statusDot" class="dot"></span><span id="statusText">Disconnected</span></span>
    </section>

    <section class="controls">
      <input id="roomId" placeholder="roomId (žėą: lobby)" value="lobby" />
      <input id="userId" placeholder="userId (žėą: player-1)" value="player-1" />
      <button id="joinBtn">Join</button>
      <button id="leaveBtn">Leave</button>
    </section>

    <section id="chatBox" class="chat"></section>

    <section id="typingIndicator" class="typing"></section>

    <section class="footer">
      <input id="message" placeholder="Ž©ĒžčúžßÄŽ•ľ žěÖŽ†•ŪēėÍ≥† EnterŽ•ľ ŽąĄŽ•īžĄłžöĒ" />
      <div class="actions">
        <button id="sendBtn">Send</button>
        <button id="refreshBtn">Refresh</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
  <script>
    const roomIdEl = document.getElementById("roomId");
    const userIdEl = document.getElementById("userId");
    const messageEl = document.getElementById("message");
    const chatBox = document.getElementById("chatBox");
    const statusText = document.getElementById("statusText");
    const statusDot = document.getElementById("statusDot");
    const typingIndicatorEl = document.getElementById("typingIndicator");

    const joinBtn = document.getElementById("joinBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    const sendBtn = document.getElementById("sendBtn");
    const refreshBtn = document.getElementById("refreshBtn");

    const ACK_TIMEOUT_MS = 2000;
    const MAX_SEND_RETRY = 3;

    let pollTimer = null;
    let lastSeq = 0;
    let lastSnapshotSignature = "";
    let isJoined = false;
    let hubConnection = null;
    let connectedRoomId = null;
    let currentMessages = [];
    let localUserId = "";
    const messageRowByKey = new Map();
    let suppressPollRefreshUntil = 0;

    let isTyping = false;
    let typingDebounceTimer = null;
    const typingUsers = new Set();

    const readReceiptsByUser = new Map();
    let lastReadSentSequence = 0;

    const pendingAcks = new Map();

    function setStatus(ok, text) {
      statusText.textContent = text;
      statusDot.classList.toggle("ok", ok);
    }

    function resetLocalSession(disconnectedText) {
      connectedRoomId = null;
      isJoined = false;
      localUserId = "";
      lastReadSentSequence = 0;
      currentMessages = [];
      messageRowByKey.clear();
      chatBox.innerHTML = "";
      lastSnapshotSignature = "";

      typingUsers.clear();
      renderTypingIndicator();

      for (const key of pendingAcks.keys()) {
        clearAckTimer(key);
      }
      pendingAcks.clear();

      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }

      setStatus(false, disconnectedText);
    }

    function normalizeReaction(item) {
      return {
        emoji: String(item?.emoji ?? item?.Emoji ?? ""),
        count: Number(item?.count ?? item?.Count ?? 0),
        users: Array.isArray(item?.users ?? item?.Users) ? (item.users ?? item.Users) : []
      };
    }

    function normalizeMessage(item) {
      const rawReactions = item?.reactions ?? item?.Reactions ?? [];
      return {
        sequence: Number(item?.sequence ?? item?.Sequence ?? 0),
        userId: String(item?.userId ?? item?.UserId ?? "unknown"),
        message: String(item?.message ?? item?.Message ?? ""),
        sentAt: item?.sentAt ?? item?.SentAt ?? new Date().toISOString(),
        clientMessageId: String(item?.clientMessageId ?? item?.ClientMessageId ?? ""),
        reactions: Array.isArray(rawReactions) ? rawReactions.map(normalizeReaction) : []
      };
    }

    function normalizeRoomSnapshot(data) {
      const participants = Number(data?.participants ?? data?.Participants ?? 0);
      const rawMessages = data?.messages ?? data?.Messages ?? [];
      const rawReadReceipts = data?.readReceipts ?? data?.ReadReceipts ?? {};

      const messages = Array.isArray(rawMessages) ? rawMessages.map(normalizeMessage) : [];
      const readReceipts = new Map();
      for (const [key, value] of Object.entries(rawReadReceipts || {})) {
        readReceipts.set(key, Number(value || 0));
      }

      return { participants, messages, readReceipts };
    }

    function upsertMessage(message) {
      const normalized = normalizeMessage(message);
      let existingIdx = currentMessages.findIndex(m => m.sequence === normalized.sequence && normalized.sequence > 0);

      if (existingIdx < 0 && normalized.clientMessageId) {
        existingIdx = currentMessages.findIndex(m => m.clientMessageId && m.clientMessageId === normalized.clientMessageId);
      }

      if (existingIdx >= 0) {
        currentMessages[existingIdx] = {
          ...currentMessages[existingIdx],
          ...normalized
        };
      } else {
        currentMessages.push(normalized);
      }

      currentMessages.sort(compareMessages);
      if (currentMessages.length > 200) {
        currentMessages.splice(0, currentMessages.length - 200);
      }

      if (normalized.sequence > lastSeq) {
        lastSeq = normalized.sequence;
      }
    }

    function compareMessages(a, b) {
      const sa = Number(a?.sequence || 0);
      const sb = Number(b?.sequence || 0);

      const va = sa > 0 ? sa : Number.MAX_SAFE_INTEGER;
      const vb = sb > 0 ? sb : Number.MAX_SAFE_INTEGER;
      if (va !== vb) {
        return va - vb;
      }

      const ta = new Date(a?.sentAt || 0).getTime();
      const tb = new Date(b?.sentAt || 0).getTime();
      return ta - tb;
    }

    function readUsersForMessage(message) {
      const readers = [];
      for (const [user, sequence] of readReceiptsByUser.entries()) {
        if (user === localUserId) continue;
        if (sequence >= message.sequence) readers.push(user);
      }
      return readers;
    }

    function getMessageKey(message) {
      const sequence = Number(message?.sequence || 0);
      if (sequence > 0) {
        return `s:${sequence}`;
      }

      const clientMessageId = String(message?.clientMessageId || "").trim();
      if (clientMessageId) {
        return `c:${clientMessageId}`;
      }

      return "";
    }

    function getMaxSequence(messages) {
      let max = 0;
      for (const m of messages) {
        const sequence = Number(m?.sequence || 0);
        if (sequence > max) {
          max = sequence;
        }
      }
      return max;
    }

    function renderMessageRow(row, m) {
      row.className = "msg";

      if (Number(m?.sequence || 0) <= 0) {
        row.classList.add("pending");
      }

      const meta = document.createElement("div");
      meta.className = "meta";

      const metaText = document.createElement("span");
      const t = new Date(m.sentAt).toLocaleTimeString();
      metaText.textContent = `${t} | ${m.userId}`;
      meta.appendChild(metaText);

      if (m.userId === localUserId) {
        const readers = readUsersForMessage(m);
        const readState = document.createElement("span");
        readState.className = "read-state";

        if (readers.length > 0) {
          readState.classList.add("read");
          readState.textContent = `Read by ${readers.slice(0, 2).join(", ")}${readers.length > 2 ? ` +${readers.length - 2}` : ""}`;
        } else {
          readState.textContent = "Sent";
        }

        meta.appendChild(readState);
      }

      const text = document.createElement("div");
      text.textContent = m.message;

      row.replaceChildren();
      row.append(meta, text);
      renderReactions(m, row);
    }

    function renderTypingIndicator() {
      if (typingUsers.size === 0) {
        typingIndicatorEl.textContent = "";
        return;
      }

      const users = Array.from(typingUsers);
      if (users.length === 1) {
        typingIndicatorEl.textContent = `${users[0]} žěÖŽ†• ž§Ď...`;
        return;
      }

      if (users.length === 2) {
        typingIndicatorEl.textContent = `${users[0]}, ${users[1]} žěÖŽ†• ž§Ď...`;
        return;
      }

      typingIndicatorEl.textContent = `${users.slice(0, 2).join(", ")} žôł ${users.length - 2}Ž™Ö žěÖŽ†• ž§Ď...`;
    }

    function makeReactionChip(emoji, count, active, onClick) {
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = `reaction-chip${active ? " active" : ""}`;
      chip.textContent = `${emoji} ${count}`;
      chip.addEventListener("click", onClick);
      return chip;
    }

    function renderReactions(message, container) {
      const reactionRow = document.createElement("div");
      reactionRow.className = "reactions";

      for (const reaction of message.reactions) {
        const active = reaction.users.includes(localUserId);
        reactionRow.appendChild(makeReactionChip(reaction.emoji, reaction.count, active, () => {
          toggleReaction(message.sequence, reaction.emoji).catch(console.error);
        }));
      }

      const quickEmojis = ["ūüĎć", "‚Ě§ÔłŹ", "ūüėā"];
      for (const emoji of quickEmojis) {
        const existing = message.reactions.find(r => r.emoji === emoji);
        if (!existing) {
          reactionRow.appendChild(makeReactionChip(emoji, 0, false, () => {
            toggleReaction(message.sequence, emoji).catch(console.error);
          }));
        }
      }

      container.appendChild(reactionRow);
    }

    async function callApi(url, method = "GET", body = null) {
      const options = {
        method,
        headers: {
          "Content-Type": "application/json"
        }
      };

      if (body) {
        options.body = JSON.stringify(body);
      }

      const res = await fetch(url, options);
      if (!res.ok) {
        const txt = await res.text();
        const err = new Error(txt || "žöĒž≤≠ žč§ŪĆ®");
        err.status = res.status;
        throw err;
      }

      if (res.status === 204) {
        return {};
      }

      const contentType = res.headers.get("content-type") || "";
      if (contentType.includes("application/json")) {
        return res.json();
      }

      const txt = await res.text();
      if (!txt) {
        return {};
      }

      try {
        return JSON.parse(txt);
      } catch {
        return { raw: txt };
      }
    }

    async function ensureHubConnection() {
      if (!window.signalR) {
        throw new Error("SignalR client script not loaded");
      }

      if (!hubConnection) {
        hubConnection = new signalR.HubConnectionBuilder()
          .withUrl("/hubs/chat")
          .withAutomaticReconnect()
          .build();

        hubConnection.on("ChatMessageReceived", (message) => {
          const normalized = normalizeMessage(message);
          upsertMessage(normalized);

          if (normalized.userId === localUserId && normalized.clientMessageId) {
            acknowledgeMessage(normalized.clientMessageId);
          }

          renderMessages(currentMessages);
        });

        hubConnection.on("MessageAck", (payload) => {
          const ackUserId = String(payload?.userId ?? payload?.UserId ?? "");
          const clientMessageId = String(payload?.clientMessageId ?? payload?.ClientMessageId ?? "");
          const sequence = Number(payload?.sequence ?? payload?.Sequence ?? 0);

          if (!clientMessageId || ackUserId !== localUserId) {
            return;
          }

          if (sequence > lastSeq) {
            lastSeq = sequence;
          }

          acknowledgeMessage(clientMessageId);
        });

        hubConnection.on("ParticipantChanged", (payload) => {
          const participants = Number(payload?.participants ?? payload?.Participants ?? 0);
          setStatus(true, `Connected | users: ${participants}`);
        });

        hubConnection.on("TypingChanged", (payload) => {
          const typingUser = String(payload?.userId ?? payload?.UserId ?? "").trim();
          const nextTyping = Boolean(payload?.isTyping ?? payload?.IsTyping);

          if (!typingUser || typingUser === localUserId) {
            return;
          }

          if (nextTyping) {
            typingUsers.add(typingUser);
          } else {
            typingUsers.delete(typingUser);
          }

          renderTypingIndicator();
        });

        hubConnection.on("MessageRead", (payload) => {
          const readUserId = String(payload?.userId ?? payload?.UserId ?? "").trim();
          const sequence = Number(payload?.sequence ?? payload?.Sequence ?? 0);

          if (!readUserId || sequence <= 0) {
            return;
          }

          const current = readReceiptsByUser.get(readUserId) ?? 0;
          if (sequence > current) {
            readReceiptsByUser.set(readUserId, sequence);
            renderMessages(currentMessages);
          }
        });

        hubConnection.on("ReactionUpdated", (payload) => {
          const sequence = Number(payload?.sequence ?? payload?.Sequence ?? 0);
          const reactionsRaw = payload?.reactions ?? payload?.Reactions ?? [];
          if (sequence <= 0) {
            return;
          }

          const msg = currentMessages.find(m => m.sequence === sequence);
          if (!msg) {
            return;
          }

          msg.reactions = Array.isArray(reactionsRaw) ? reactionsRaw.map(normalizeReaction) : [];
          renderMessages(currentMessages);
        });

        hubConnection.on("ForceLogout", async (payload) => {
          const reason = String(payload?.reason ?? payload?.Reason ?? "Žč§Ž•ł ŪĀīŽĚľžĚīžĖłŪäłžóźžĄú ŽŹôžĚľ userIdŽ°ú ž†ĎžÜćŪĖąžäĶŽčąŽč§.");
          resetLocalSession("Disconnected (forced logout)");

          if (hubConnection && hubConnection.state === "Connected") {
            try {
              await hubConnection.stop();
            } catch {
            }
          }

          alert(reason);
        });

        hubConnection.onclose(() => {
          setStatus(false, "Disconnected (SignalR closed)");
        });
      }

      if (hubConnection.state === "Disconnected") {
        await hubConnection.start();
      }
    }

    async function notifyTyping(nextTyping) {
      if (!isJoined || !hubConnection || hubConnection.state !== "Connected" || !connectedRoomId) {
        return;
      }

      if (isTyping === nextTyping) {
        return;
      }

      isTyping = nextTyping;
      const userId = userIdEl.value.trim();
      if (!userId) {
        return;
      }

      await hubConnection.invoke("NotifyTyping", connectedRoomId, userId, nextTyping);
    }

    async function notifyRead(sequence) {
      if (!isJoined || !hubConnection || hubConnection.state !== "Connected" || !connectedRoomId) {
        return;
      }

      if (sequence <= 0 || sequence <= lastReadSentSequence) {
        return;
      }

      const userId = userIdEl.value.trim();
      if (!userId) {
        return;
      }

      lastReadSentSequence = sequence;
      await hubConnection.invoke("NotifyRead", connectedRoomId, userId, sequence);
    }

    function renderMessages(messages) {
      currentMessages = Array.isArray(messages) ? messages.slice() : [];
      currentMessages.sort(compareMessages);

      const signature = JSON.stringify({
        m: currentMessages.map(x => ({
          s: x.sequence,
          u: x.userId,
          t: x.sentAt,
          m: x.message,
          c: x.clientMessageId,
          r: x.reactions.map(k => ({ e: k.emoji, c: k.count, u: k.users }))
        })),
        rr: Array.from(readReceiptsByUser.entries())
      });

      if (signature === lastSnapshotSignature) {
        return;
      }
      lastSnapshotSignature = signature;

      const isNearBottom = (chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight) < 24;

      const nextKeys = new Set();
      for (const m of currentMessages) {
        const key = getMessageKey(m);
        if (!key) {
          continue;
        }

        nextKeys.add(key);

        let row = messageRowByKey.get(key);
        if (!row) {
          row = document.createElement("div");
          row.dataset.key = key;
          messageRowByKey.set(key, row);
        }

        renderMessageRow(row, m);
        chatBox.appendChild(row);

        lastSeq = Math.max(lastSeq, Number(m.sequence || 0));
      }

      for (const [key, row] of messageRowByKey.entries()) {
        if (nextKeys.has(key)) {
          continue;
        }

        if (row.parentElement === chatBox) {
          chatBox.removeChild(row);
        }
        messageRowByKey.delete(key);
      }

      if (isNearBottom || currentMessages.length <= 1) {
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      const lastMessage = currentMessages[currentMessages.length - 1];
      if (lastMessage) {
        notifyRead(Number(lastMessage.sequence || 0)).catch(console.error);
      }
    }

    function clearAckTimer(clientMessageId) {
      const pending = pendingAcks.get(clientMessageId);
      if (!pending) return;
      if (pending.timerId) {
        clearTimeout(pending.timerId);
      }
    }

    function acknowledgeMessage(clientMessageId) {
      clearAckTimer(clientMessageId);
      pendingAcks.delete(clientMessageId);
    }

    function scheduleRetry(clientMessageId) {
      const pending = pendingAcks.get(clientMessageId);
      if (!pending) {
        return;
      }

      pending.timerId = setTimeout(async () => {
        const latest = pendingAcks.get(clientMessageId);
        if (!latest) {
          return;
        }

        if (latest.attempt >= MAX_SEND_RETRY) {
          pendingAcks.delete(clientMessageId);
          setStatus(false, `Send failed after ${MAX_SEND_RETRY} retries`);
          return;
        }

        latest.attempt += 1;
        try {
          await callApi(`/api/chat/${encodeURIComponent(latest.roomId)}/message`, "POST", {
            userId: latest.userId,
            message: latest.message,
            clientMessageId
          });
        } catch (err) {
          console.error(err);
        }

        scheduleRetry(clientMessageId);
      }, ACK_TIMEOUT_MS);
    }

    async function refresh(options = {}) {
      const source = String(options?.source ?? "manual");
      const force = Boolean(options?.force);
      const roomId = roomIdEl.value.trim();
      if (!roomId) return;

      if (source === "poll" && Date.now() < suppressPollRefreshUntil) {
        return;
      }

      const data = await callApi(`/api/chat/${encodeURIComponent(roomId)}/messages?take=100`);
      const snapshot = normalizeRoomSnapshot(data);

      const snapshotMaxSeq = getMaxSequence(snapshot.messages);
      const localMaxSeq = getMaxSequence(currentMessages);
      if (!force && source === "poll" && snapshotMaxSeq < localMaxSeq) {
        setStatus(true, `Connected | users: ${snapshot.participants}`);
        return;
      }

      readReceiptsByUser.clear();
      for (const [k, v] of snapshot.readReceipts.entries()) {
        readReceiptsByUser.set(k, v);
      }

      renderMessages(snapshot.messages);
      setStatus(true, `Connected | users: ${snapshot.participants}`);
    }

    async function join() {
      const roomId = roomIdEl.value.trim();
      const userId = userIdEl.value.trim();
      if (!roomId || !userId) return;

      localUserId = userId;
      lastReadSentSequence = 0;

      joinBtn.disabled = true;
      await callApi(`/api/chat/${encodeURIComponent(roomId)}/join`, "POST", { userId });

      await ensureHubConnection();
      if (connectedRoomId && connectedRoomId !== roomId) {
        await hubConnection.invoke("LeaveRoom", connectedRoomId);
      }

      await hubConnection.invoke("JoinRoom", roomId, userId);
      connectedRoomId = roomId;
      isJoined = true;

      typingUsers.clear();
      renderTypingIndicator();
      await refresh({ source: "join" });

      if (pollTimer) {
        clearInterval(pollTimer);
      }

      pollTimer = setInterval(async () => {
        try {
          await refresh({ source: "poll" });
        } catch (err) {
          console.error(err);
          setStatus(false, "Disconnected (refresh failed)");
        }
      }, 10000);

      joinBtn.disabled = false;
    }

    async function leave() {
      const roomId = roomIdEl.value.trim();
      const userId = userIdEl.value.trim();
      if (!roomId || !userId) return;

      await callApi(`/api/chat/${encodeURIComponent(roomId)}/leave`, "POST", { userId });
      await notifyTyping(false);

      if (hubConnection && hubConnection.state === "Connected" && connectedRoomId === roomId) {
        await hubConnection.invoke("LeaveRoom", roomId);
      }

      resetLocalSession("Disconnected");
    }

    function leaveOnUnload() {
      if (!isJoined) {
        return;
      }

      const roomId = roomIdEl.value.trim();
      const userId = userIdEl.value.trim();
      if (!roomId || !userId) {
        return;
      }

      const url = `/api/chat/${encodeURIComponent(roomId)}/leave-keepalive?userId=${encodeURIComponent(userId)}`;

      try {
        if (navigator.sendBeacon) {
          navigator.sendBeacon(url, new Blob([], { type: "text/plain" }));
        } else {
          fetch(url, { method: "POST", keepalive: true });
        }
      } catch {
      }
    }

    async function toggleReaction(sequence, emoji) {
      const roomId = roomIdEl.value.trim();
      const userId = userIdEl.value.trim();
      if (!roomId || !userId || sequence <= 0 || !emoji) {
        return;
      }

      try {
        await callApi(`/api/chat/${encodeURIComponent(roomId)}/react`, "POST", {
          userId,
          sequence,
          emoji
        });
      } catch (err) {
        if (err && err.status === 404) {
          await callApi(`/api/chat/${encodeURIComponent(roomId)}/reaction`, "POST", {
            userId,
            sequence,
            emoji
          });
          return;
        }

        throw err;
      }
    }

    function generateClientMessageId() {
      if (window.crypto && window.crypto.randomUUID) {
        return window.crypto.randomUUID();
      }
      return `msg-${Date.now()}-${Math.floor(Math.random() * 1000000)}`;
    }

    async function send() {
      const roomId = roomIdEl.value.trim();
      const userId = userIdEl.value.trim();
      const message = messageEl.value.trim();
      if (!roomId || !userId || !message) return;
      if (!isJoined || connectedRoomId !== roomId) {
        setStatus(false, "Join ŪõĄ ž†ĄžÜ°Ūēī ž£ľžĄłžöĒ.");
        return;
      }

      const clientMessageId = generateClientMessageId();

      sendBtn.disabled = true;
      await notifyTyping(false);
      messageEl.value = "";

      // Optimistic append so users see their message immediately.
      upsertMessage({
        sequence: 0,
        userId,
        message,
        sentAt: new Date().toISOString(),
        clientMessageId,
        reactions: []
      });
      renderMessages(currentMessages);

      pendingAcks.set(clientMessageId, {
        roomId,
        userId,
        message,
        attempt: 1,
        timerId: null
      });

      try {
        const sent = await callApi(`/api/chat/${encodeURIComponent(roomId)}/message`, "POST", {
          userId,
          message,
          clientMessageId
        });

        const sequence = Number(sent?.sequence ?? sent?.Sequence ?? 0);
        if (sequence <= 0) {
          await refresh({ source: "reconcile", force: true });
          suppressPollRefreshUntil = Date.now() + 1500;
        } else {
          upsertMessage({
            sequence,
            userId: String(sent?.userId ?? sent?.UserId ?? userId),
            message: String(sent?.message ?? sent?.Message ?? message),
            sentAt: sent?.sentAt ?? sent?.SentAt ?? new Date().toISOString(),
            clientMessageId: String(sent?.clientMessageId ?? sent?.ClientMessageId ?? clientMessageId),
            reactions: []
          });
          renderMessages(currentMessages);
          suppressPollRefreshUntil = Date.now() + 1500;
        }

        // Always reconcile once after send to avoid UI stalls when realtime ordering races.
        setTimeout(() => {
          refresh({ source: "reconcile", force: true }).catch(console.error);
        }, 250);
      } catch (err) {
        console.error(err);
        setStatus(false, `Send failed: ${err.message}`);
        await refresh({ source: "reconcile", force: true }).catch(console.error);
      } finally {
        scheduleRetry(clientMessageId);
        sendBtn.disabled = false;
      }
    }

    joinBtn.addEventListener("click", () => join().catch(err => {
      joinBtn.disabled = false;
      console.error(err);
      setStatus(false, `Join failed: ${err.message}`);
      alert(err.message);
    }));

    leaveBtn.addEventListener("click", () => leave().catch(err => {
      console.error(err);
      setStatus(false, `Leave failed: ${err.message}`);
      alert(err.message);
    }));

    sendBtn.addEventListener("click", () => send().catch(err => {
      sendBtn.disabled = false;
      console.error(err);
      setStatus(false, `Send failed: ${err.message}`);
      alert(err.message);
    }));

    refreshBtn.addEventListener("click", () => refresh({ source: "manual" }).catch(err => {
      console.error(err);
      setStatus(false, `Refresh failed: ${err.message}`);
      alert(err.message);
    }));

    messageEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        send().catch(err => {
          sendBtn.disabled = false;
          alert(err.message);
        });
      }
    });

    messageEl.addEventListener("input", () => {
      if (!isJoined) {
        return;
      }

      const value = messageEl.value.trim();

      if (typingDebounceTimer) {
        clearTimeout(typingDebounceTimer);
      }

      if (value.length === 0) {
        notifyTyping(false).catch(console.error);
        return;
      }

      notifyTyping(true).catch(console.error);
      typingDebounceTimer = setTimeout(() => {
        notifyTyping(false).catch(console.error);
      }, 1200);
    });

    window.addEventListener("pagehide", leaveOnUnload);
    window.addEventListener("beforeunload", leaveOnUnload);

    setStatus(false, "Disconnected");
  </script>
</body>
</html>
